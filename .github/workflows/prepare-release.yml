name: Prepare Release Draft

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (must start with v, e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog_content }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python for commitizen
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'  # Stable version for commitizen

      - name: Ensure node is available (act)
        if: env.ACT == 'true'
        run: |
          # Some act runner images lose `node` in PATH during post-steps of node-based actions.
          NODE_BIN="$(find /opt/acttoolcache/node -type f -name node -path '*/bin/node' 2>/dev/null | head -1 || true)"
          if [ -n "$NODE_BIN" ]; then
            echo "$(dirname "$NODE_BIN")" >> "$GITHUB_PATH"
            echo "✅ Added node to PATH for act: $(dirname "$NODE_BIN")"
          else
            echo "⚠️ node not found under /opt/acttoolcache/node; post-steps may fail in act"
          fi

      - name: Install commitizen
        run: |
          python -m pip install --upgrade pip
          pip install commitizen

      - name: Verify project setup
        run: |
          echo "🔍 Detecting project structure..."

          # Check for different project types
          PROJECT_TYPES=()

          if find . -name "package.json" -not -path "./node_modules/*" | grep -q .; then
            PROJECT_TYPES+=("Node.js/npm")
          fi

          if find . -name "pyproject.toml" | grep -q .; then
            PROJECT_TYPES+=("Python/pyproject.toml")
          fi

          if [ -f "setup.py" ]; then
            PROJECT_TYPES+=("Python/setup.py")
          fi

          if find . -name "Cargo.toml" | grep -q .; then
            PROJECT_TYPES+=("Rust/Cargo")
          fi

          if find . -name "composer.json" | grep -q .; then
            PROJECT_TYPES+=("PHP/Composer")
          fi

          if [ ${#PROJECT_TYPES[@]} -eq 0 ]; then
            echo "⚠️  No standard project files detected - will use generic version file handling"
          else
            echo "✅ Detected project types:"
            printf "   - %s\n" "${PROJECT_TYPES[@]}"
          fi

          # Check for commitizen config
          if [ -f "cz.json" ] || [ -f ".cz.json" ] || [ -f "pyproject.toml" ] || [ -f ".cz.toml" ]; then
            echo "✅ Commitizen configuration found"
          else
            echo "⚠️  No commitizen config found - will use default conventional commits"
          fi

      - name: Validate and set version
        id: version
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"

          # Validate version format (must start with v)
          if [[ ! $VERSION_INPUT =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "❌ Error: Version must start with 'v' and follow semantic versioning (e.g., v1.0.0)"
            exit 1
          fi

          # Check if tag already exists
          if git tag -l | grep -q "^${VERSION_INPUT}$"; then
            echo "❌ Error: Tag ${VERSION_INPUT} already exists"
            exit 1
          fi

          TAG_NAME="$VERSION_INPUT"
          VERSION="${VERSION_INPUT#v}"  # Remove 'v' prefix
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Preparing release version: $VERSION (tag: $TAG_NAME)"

      - name: Update project version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag }}"

          echo "📝 Auto-detecting project type and updating version files to $VERSION..."

          # Function to update JSON version field
          update_json_version() {
            local file="$1"
            echo "  → Updating $file..."
            sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$file"
            rm -f "$file.bak"
          }

          # Function to update TOML version field
          update_toml_version() {
            local file="$1"
            echo "  → Updating $file..."
            sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" "$file"
            rm -f "$file.bak"
          }

          # Function to update Python __version__ or VERSION
          update_python_version() {
            local file="$1"
            echo "  → Updating $file..."
            sed -i.bak -E "s/__version__ = ['\"]([^'\"]*)['\"]/__version__ = '$VERSION'/" "$file"
            sed -i.bak -E "s/VERSION = ['\"]([^'\"]*)['\"]//VERSION = '$VERSION'/" "$file"
            rm -f "$file.bak"
          }

          UPDATED_FILES=()

          # 1. Node.js/npm projects - Look for package.json files
          echo "🔍 Scanning for Node.js/npm projects..."
          while read -r file; do
            if [ -f "$file" ]; then
              update_json_version "$file"
              UPDATED_FILES+=("$file")
            fi
          done < <(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*")

          # 2. Python pyproject.toml projects
          echo "🔍 Scanning for Python pyproject.toml projects..."
          while read -r file; do
            if [ -f "$file" ] && grep -q "version.*=" "$file"; then
              update_toml_version "$file"
              UPDATED_FILES+=("$file")
            fi
          done < <(find . -name "pyproject.toml" -not -path "./.git/*")

          # 3. Python setup.py projects
          echo "🔍 Scanning for Python setup.py projects..."
          if [ -f "setup.py" ]; then
            # Update version in setup.py (common patterns)
            echo "  → Updating setup.py..."
            sed -i.bak -E "s/version=['\"]([^'\"]*)['\"],/version='$VERSION',/" setup.py
            sed -i.bak -E "s/version = ['\"]([^'\"]*)['\"],/version = '$VERSION',/" setup.py
            rm -f setup.py.bak
            UPDATED_FILES+=("setup.py")
          fi

          # 4. Python __init__.py version files
          echo "🔍 Scanning for Python __init__.py version files..."
          while read -r file; do
            if grep -q "__version__\|VERSION" "$file" 2>/dev/null; then
              update_python_version "$file"
              UPDATED_FILES+=("$file")
            fi
          done < <(find . -name "__init__.py" -not -path "./.git/*")

          # 5. Cargo.toml for Rust projects
          echo "🔍 Scanning for Rust Cargo.toml projects..."
          while read -r file; do
            if [ -f "$file" ]; then
              update_toml_version "$file"
              UPDATED_FILES+=("$file")
            fi
          done < <(find . -name "Cargo.toml" -not -path "./.git/*")

          # 6. Docker Compose files (AI-Shifu release images only)
          echo "🔍 Scanning for Docker Compose files..."
          while read -r file; do
            if [ -f "$file" ]; then
              before_hash=$(sha256sum "$file" | cut -d' ' -f1)
              echo "  → Updating AI-Shifu Docker image tags in $file..."
              # Keep third-party image tags (Prometheus, Grafana, MySQL, Redis, etc.) unchanged.
              sed -i.bak -E "s#image: aishifu/(ai-shifu-api|ai-shifu-cook-web):[^[:space:]]+#image: aishifu/\1:$TAG_NAME#g" "$file"
              rm -f "$file.bak"
              after_hash=$(sha256sum "$file" | cut -d' ' -f1)
              if [ "$before_hash" != "$after_hash" ]; then
                UPDATED_FILES+=("$file")
              fi
            fi
          done < <(find . \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \) -not -path "./.git/*")

          # Guard against accidental third-party image tag changes in release PRs.
          if git diff --unified=0 -- 'docker/docker-compose*.yml' 'docker/docker-compose*.yaml' \
            | grep -E '^[+-][[:space:]]*image: ' \
            | grep -Ev '^[+-][[:space:]]*image: aishifu/(ai-shifu-api|ai-shifu-cook-web):' \
            | grep -Ev '^(---|\+\+\+)' ; then
            echo "❌ Release version bump changed a third-party Docker image tag. Refusing to continue."
            exit 1
          fi

          # 7. Version files (VERSION, version.txt, etc.)
          echo "🔍 Scanning for version files..."
          for version_file in VERSION version.txt .version; do
            if [ -f "$version_file" ]; then
              echo "  → Updating $version_file..."
              echo "$VERSION" > "$version_file"
              UPDATED_FILES+=("$version_file")
            fi
          done

          # Summary
          if [ ${#UPDATED_FILES[@]} -eq 0 ]; then
            echo "⚠️ No version files found to update. This might be expected for some project types."
          else
            echo "✅ Updated version files:"
            printf "   - %s\n" "${UPDATED_FILES[@]}"
          fi

      - name: Get previous tag for changelog
        id: prev_tag
        run: |
          echo "📝 Getting previous tag for changelog generation..."

          # Ensure all tags are fetched (skip in act because local git remotes are often SSH)
          if [ "${ACT:-}" != "true" ]; then
            git fetch --tags --force
          else
            echo "⚠️ Running under act; skipping 'git fetch --tags --force' and using local tags"
          fi

          # List all tags for debugging
          echo "📋 All available tags:"
          git tag -l --sort=-version:refname | head -10

          # Get the latest existing tag before we create the new one
          PREV_TAG=$(git tag -l --sort=-version:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -1 || echo "")

          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          if [ -n "$PREV_TAG" ]; then
            echo "📋 Previous tag found: $PREV_TAG"
            echo "📋 Will generate changelog from $PREV_TAG to ${{ steps.version.outputs.tag }}"
          else
            echo "📋 No previous tag found - this will be the initial release"
          fi

      - name: Generate changelog using cz
        id: changelog
        env:
          RELEASE_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Generating changelog using commitizen for version ${{ steps.version.outputs.version }}..."

          # Use the previous tag we got before creating the new tag
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          CURRENT_TAG="${{ steps.version.outputs.tag }}"

          if [ -n "$PREV_TAG" ]; then
            echo "📋 Generating changelog from $PREV_TAG to HEAD using commitizen"

            # Try using commitizen first
            if cz changelog --dry-run --start-rev "$PREV_TAG" > /tmp/cz_changelog.md 2>/dev/null && [ -s /tmp/cz_changelog.md ]; then
              echo "✅ Successfully generated changelog using commitizen"
              CHANGELOG_CONTENT=$(cat /tmp/cz_changelog.md)
            else
              echo "⚠️ Commitizen failed, falling back to manual git log parsing"

              # Fallback to manual parsing (original logic)
              echo "## Changes since $PREV_TAG" > /tmp/changelog.md
              echo "" >> /tmp/changelog.md

              # Get conventional commits and categorize them
              FEAT_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -E "^- feat[:\(]" | sed 's/^- feat[:\(][^)]*[)]*: */- /' || echo "")
              FIX_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -E "^- fix[:\(]" | sed 's/^- fix[:\(][^)]*[)]*: */- /' || echo "")
              CHORE_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -E "^- chore[:\(]" | sed 's/^- chore[:\(][^)]*[)]*: */- /' || echo "")
              DOCS_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -E "^- docs[:\(]" | sed 's/^- docs[:\(][^)]*[)]*: */- /' || echo "")
              REFACTOR_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -E "^- refactor[:\(]" | sed 's/^- refactor[:\(][^)]*[)]*: */- /' || echo "")

              # Add sections with emoji headers (abbreviated for space)
              if [ -n "$FEAT_COMMITS" ]; then
                echo "### ✨ Features" >> /tmp/changelog.md
                echo "$FEAT_COMMITS" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              if [ -n "$FIX_COMMITS" ]; then
                echo "### 🐛 Bug Fixes" >> /tmp/changelog.md
                echo "$FIX_COMMITS" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              if [ -n "$REFACTOR_COMMITS" ]; then
                echo "### ♻️ Code Refactoring" >> /tmp/changelog.md
                echo "$REFACTOR_COMMITS" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              if [ -n "$DOCS_COMMITS" ]; then
                echo "### 📚 Documentation" >> /tmp/changelog.md
                echo "$DOCS_COMMITS" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              if [ -n "$CHORE_COMMITS" ]; then
                echo "### 🔧 Chores" >> /tmp/changelog.md
                echo "$CHORE_COMMITS" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              # If no categorized commits found, add a note
              if [ -z "$FEAT_COMMITS" ] && [ -z "$FIX_COMMITS" ] && [ -z "$REFACTOR_COMMITS" ] && [ -z "$DOCS_COMMITS" ] && [ -z "$CHORE_COMMITS" ]; then
                echo "### 📝 Other Changes" >> /tmp/changelog.md
                OTHER_COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | grep -v -E "^- (feat|fix|docs|style|refactor|perf|test|build|ci|chore)[:\(]" || echo "")
                if [ -n "$OTHER_COMMITS" ]; then
                  echo "$OTHER_COMMITS" >> /tmp/changelog.md
                else
                  echo "- Minor updates and improvements" >> /tmp/changelog.md
                fi
                echo "" >> /tmp/changelog.md
              fi

              CHANGELOG_CONTENT=$(cat /tmp/changelog.md)
            fi
          else
            echo "📋 No previous tag found, generating initial changelog"
            echo "## 🎉 Initial Release" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md

            # Get repository name for personalized message
            REPO_NAME="${{ github.event.repository.name }}"
            echo "This is the first tagged release of **${REPO_NAME}**. Thank you for your interest in this project!" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md

            # Try to extract key information from README.md
            if [ -f "README.md" ]; then
              echo "📋 Extracting project information from README.md"

              # Try to extract description (first paragraph after title)
              DESCRIPTION=$(sed -n '2,10p' README.md | grep -v "^#" | grep -v "^\s*$" | head -3 | tr '\n' ' ')
              if [ -n "$DESCRIPTION" ]; then
                echo "## About" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
                echo "$DESCRIPTION" >> /tmp/changelog.md
                echo "" >> /tmp/changelog.md
              fi

              # Try to extract Features/Installation/Usage sections
              for section in "Features" "Installation" "Usage" "Getting Started" "Quick Start"; do
                if grep -q "^# $section" README.md; then
                  sed -n "/^# $section/,/^# /p" README.md | sed '$ d' >> /tmp/changelog.md
                  echo "" >> /tmp/changelog.md
                  break
                fi
              done
            else
              # Generic fallback
              echo "## About" >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
              echo "This project follows semantic versioning and conventional commits for reliable releases." >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
              echo "## Getting Started" >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
              echo "Please check the README.md file for installation and usage instructions." >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
            fi

            CHANGELOG_CONTENT=$(cat /tmp/changelog.md)
          fi

          # Prepare changelog content for output
          echo "$CHANGELOG_CONTENT" > /tmp/changelog_raw.md

          # Append PR author after each "(#123)" occurrence (best-effort; never fails the workflow).
          python - <<'PY' > /tmp/changelog.md || cp /tmp/changelog_raw.md /tmp/changelog.md
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.error
          import urllib.request

          def detect_repo_from_git_remotes() -> str:
              for remote_name in ("upstream", "origin"):
                  try:
                      url = subprocess.check_output(
                          ["git", "remote", "get-url", remote_name],
                          text=True,
                          stderr=subprocess.DEVNULL,
                      ).strip()
                  except Exception:
                      continue

                  match = re.search(
                      r"github\.com[:/](?P<owner>[^/]+)/(?P<repo>[^/]+?)(?:\.git)?$",
                      url,
                  )
                  if match:
                      return f"{match.group('owner')}/{match.group('repo')}"
              return ""

          repo = (os.environ.get("GITHUB_REPOSITORY") or "").strip()
          if not repo or repo == "nektos/act":
              detected = detect_repo_from_git_remotes()
              if detected:
                  repo = detected

          token = (
              (os.environ.get("RELEASE_TOKEN") or "").strip()
              or (os.environ.get("GITHUB_TOKEN") or "").strip()
          )

          try:
              content = open("/tmp/changelog_raw.md", encoding="utf-8").read()
          except FileNotFoundError:
              print("")
              sys.exit(0)

          def normalize_changelog(raw: str) -> str:
              lines = []
              for line in raw.splitlines():
                  if re.match(r"^##\s*\[?Unreleased\]?\s*$", line.strip()):
                      continue

                  line = re.sub(
                      r"^###\s+Feat\b.*$",
                      "### New Feature",
                      line,
                      flags=re.IGNORECASE,
                  )
                  line = re.sub(
                      r"^###\s+Fix(?:es)?\b.*$",
                      "### Bug Fixes",
                      line,
                      flags=re.IGNORECASE,
                  )
                  lines.append(line)

              normalized = "\n".join(lines).strip("\n")
              normalized = re.sub(r"\n{3,}", "\n\n", normalized)
              return normalized

          content = normalize_changelog(content)

          pr_numbers = sorted({int(n) for n in re.findall(r"\(#(\d+)\)", content)})
          if not pr_numbers or not repo:
              print(content)
              sys.exit(0)

          def fetch_pr_author(pr_number: int) -> str:
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}"
              request = urllib.request.Request(url)
              request.add_header("Accept", "application/vnd.github+json")
              request.add_header("X-GitHub-Api-Version", "2022-11-28")
              if token:
                  request.add_header("Authorization", f"Bearer {token}")
              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      data = json.load(response)
              except urllib.error.HTTPError:
                  return ""
              except Exception:
                  return ""

              login = ((data.get("user") or {}).get("login") or "").strip()
              return f"@{login}" if login else ""

          authors = {pr: fetch_pr_author(pr) for pr in pr_numbers}
          pr_pattern = re.compile(r"\(#(\d+)\)")

          out_lines = []
          for line in content.splitlines():
              def annotate(match: re.Match[str], line=line) -> str:
                  pr_number = int(match.group(1))
                  author = authors.get(pr_number, "")
                  pr_ref = match.group(0)

                  suffix = line[match.end():]
                  if re.match(r"\s*\(@", suffix) or re.match(r"\s+by\s+@", suffix):
                      return pr_ref

                  return f"{pr_ref} ({author})" if author else pr_ref

              out_lines.append(pr_pattern.sub(annotate, line))

          print("\n".join(out_lines))
          PY

          CHANGELOG_CONTENT=$(cat /tmp/changelog.md)

          echo "changelog_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ Changelog generated successfully"

      - name: Generate MarkdownFlow dependency changelog
        id: markdownflow_dependency_changelog
        env:
          RELEASE_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          PREV_TAG = os.environ.get("PREV_TAG", "")
          MAX_COMMITS_PER_DEPENDENCY = 20
          MAX_COMMIT_LOOKUP_PAGES = 3

          DEPENDENCIES = [
              {
                  "name": "markdown-flow",
                  "repo": "ai-shifu/markdown-flow-agent-py",
                  "path": "src/api/requirements.txt",
                  "type": "requirements",
                  "registry": "pypi",
              },
              {
                  "name": "markdown-flow-ui",
                  "repo": "ai-shifu/markdown-flow-ui",
                  "path": "src/cook-web/package-lock.json",
                  "type": "package_lock",
                  "registry": "npm",
              },
          ]


          def write_output(content: str) -> None:
              output_path = os.environ.get("GITHUB_OUTPUT")
              if not output_path:
                  print(content)
                  return

              delimiter = "MARKDOWNFLOW_DEPENDENCY_CHANGELOG"
              with open(output_path, "a", encoding="utf-8") as output:
                  output.write(f"content<<{delimiter}\n")
                  output.write(content)
                  output.write(f"\n{delimiter}\n")


          def git_show(ref: str, path: str) -> str:
              if not ref:
                  return ""

              try:
                  return subprocess.check_output(
                      ["git", "show", f"{ref}:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except Exception:
                  return ""


          def read_current(path: str) -> str:
              try:
                  with open(path, encoding="utf-8") as current_file:
                      return current_file.read()
              except FileNotFoundError:
                  return ""


          def normalize_version(raw: str) -> str:
              match = re.search(
                  r"\d+\.\d+\.\d+(?:[.-][0-9A-Za-z][0-9A-Za-z.-]*)?",
                  raw,
              )
              return match.group(0) if match else ""


          def extract_version(content: str, dependency: dict[str, str]) -> str:
              if not content:
                  return ""

              name = dependency["name"]
              if dependency["type"] == "requirements":
                  match = re.search(
                      rf"(?m)^\s*{re.escape(name)}==\s*([^#;\s]+)",
                      content,
                  )
                  return normalize_version(match.group(1)) if match else ""

              if dependency["type"] == "package_json":
                  try:
                      package = json.loads(content)
                  except json.JSONDecodeError:
                      return ""

                  for section in (
                      "dependencies",
                      "devDependencies",
                      "optionalDependencies",
                      "peerDependencies",
                  ):
                      raw = (package.get(section) or {}).get(name)
                      if raw:
                          return normalize_version(str(raw))

              if dependency["type"] == "package_lock":
                  try:
                      package_lock = json.loads(content)
                  except json.JSONDecodeError:
                      return ""

                  locked_package = (package_lock.get("packages") or {}).get(
                      f"node_modules/{name}",
                  ) or {}
                  raw = locked_package.get("version")
                  return normalize_version(str(raw)) if raw else ""

              return ""


          token = (
              (os.environ.get("RELEASE_TOKEN") or "").strip()
              or (os.environ.get("GITHUB_TOKEN") or "").strip()
          )


          def github_json(api_path: str):
              request = urllib.request.Request(f"https://api.github.com{api_path}")
              request.add_header("Accept", "application/vnd.github+json")
              request.add_header("X-GitHub-Api-Version", "2022-11-28")
              if token:
                  request.add_header("Authorization", f"Bearer {token}")

              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)


          pr_author_cache: dict[tuple[str, int], str] = {}


          def fetch_pr_author(repo: str, pr_number: int) -> str:
              cache_key = (repo, pr_number)
              if cache_key in pr_author_cache:
                  return pr_author_cache[cache_key]

              try:
                  data = github_json(f"/repos/{repo}/pulls/{pr_number}")
              except urllib.error.HTTPError:
                  author = ""
              except Exception:
                  author = ""
              else:
                  login = ((data.get("user") or {}).get("login") or "").strip()
                  author = f"@{login}" if login else ""

              pr_author_cache[cache_key] = author
              return author


          def fetch_public_json(url: str) -> dict:
              request = urllib.request.Request(url)
              request.add_header("Accept", "application/json")
              request.add_header("User-Agent", "ai-shifu-release-notes")
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)


          def tag_exists(repo: str, tag: str) -> bool:
              encoded_tag = urllib.parse.quote(tag, safe="")
              try:
                  github_json(f"/repos/{repo}/git/ref/tags/{encoded_tag}")
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return False
                  raise
              return True


          def resolve_tag(repo: str, package_name: str, version: str) -> str:
              candidates = [
                  f"v{version}",
                  version,
                  f"{package_name}@{version}",
              ]
              for candidate in candidates:
                  if tag_exists(repo, candidate):
                      return candidate
              return ""


          def compare_tags(repo: str, base_tag: str, head_tag: str) -> dict:
              encoded_base = urllib.parse.quote(base_tag, safe="")
              encoded_head = urllib.parse.quote(head_tag, safe="")
              return github_json(f"/repos/{repo}/compare/{encoded_base}...{encoded_head}")


          def package_publish_time(dependency: dict[str, str], version: str) -> str:
              name = dependency["name"]
              registry = dependency["registry"]
              if registry == "pypi":
                  data = fetch_public_json(f"https://pypi.org/pypi/{name}/json")
                  uploads = data.get("releases", {}).get(version, [])
                  times = sorted(
                      upload.get("upload_time_iso_8601", "")
                      for upload in uploads
                      if upload.get("upload_time_iso_8601")
                  )
                  return times[-1] if times else ""

              if registry == "npm":
                  encoded_name = urllib.parse.quote(name, safe="")
                  data = fetch_public_json(f"https://registry.npmjs.org/{encoded_name}")
                  return ((data.get("time") or {}).get(version) or "").strip()

              return ""


          def format_commit_subject(subject: str) -> str:
              subject = re.sub(r"\s+", " ", subject.strip())
              subject = re.sub(r"^Merge pull request #\d+ from \S+\s*", "", subject)
              return subject


          def is_version_only_commit(subject: str) -> bool:
              conventional_prefix = r"(?:feat|fix|chore|build|ci|bump)(?:\([^)]+\))?!?:"
              version_action = r"(?:update|bump|release|set)"
              version_target = r"(?:package\s+)?version(?:\s+number)?"
              version_value = r"v?\d+(?:\.\d+)+(?:[-+][0-9A-Za-z.-]+)?"
              patterns = [
                  rf"^{conventional_prefix}\s+release\b",
                  rf"^{conventional_prefix}\s+{version_action}\s+{version_target}\b",
                  rf"^{conventional_prefix}\s+{version_target}\s+{version_action}\b",
                  rf"^{conventional_prefix}\s+{version_target}\s+{version_value}\b",
              ]
              return any(re.match(pattern, subject, re.IGNORECASE) for pattern in patterns)


          def commit_sort_key(index_and_subject: tuple[int, str]) -> tuple[int, int]:
              index, subject = index_and_subject
              if re.match(r"^feat(?:\([^)]+\))?!?:", subject, re.IGNORECASE):
                  return (0, index)
              if re.match(r"^fix(?:\([^)]+\))?!?:", subject, re.IGNORECASE):
                  return (1, index)
              return (2, index)


          def link_pr_references(subject: str, repo: str) -> str:
              pr_pattern = re.compile(r"\(#(\d+)\)")

              def replace(match: re.Match[str]) -> str:
                  pr_number = int(match.group(1))
                  pr_ref = f"({repo}#{pr_number})"
                  author = fetch_pr_author(repo, pr_number)
                  return f"{pr_ref} ({author})" if author else pr_ref

              return pr_pattern.sub(replace, subject)


          def commits_between_times(repo: str, since: str, until: str) -> list[str]:
              per_page = 100
              page = 1
              commits = []
              while True:
                  query = urllib.parse.urlencode(
                      {
                          "since": since,
                          "until": until,
                          "per_page": str(per_page),
                          "page": str(page),
                      },
                  )
                  page_commits = github_json(f"/repos/{repo}/commits?{query}")
                  if not page_commits:
                      break
                  if not isinstance(page_commits, list):
                      message = ""
                      if isinstance(page_commits, dict):
                          message = str(page_commits.get("message") or "").strip()
                      details = f": {message}" if message else ""
                      print(
                          "::warning::"
                          f"Stopped scanning commits for {repo}; GitHub returned "
                          f"{type(page_commits).__name__}{details}.",
                          file=sys.stderr,
                      )
                      break

                  commits.extend(page_commits)
                  if len(page_commits) < per_page:
                      break
                  if page >= MAX_COMMIT_LOOKUP_PAGES:
                      print(
                          "::warning::"
                          f"Stopped scanning commits for {repo} after "
                          f"{MAX_COMMIT_LOOKUP_PAGES} pages.",
                          file=sys.stderr,
                      )
                      break
                  page += 1

              subjects = []
              seen_subjects = set()
              for commit in reversed(commits):
                  message = ((commit.get("commit") or {}).get("message") or "").splitlines()
                  subject = format_commit_subject(message[0] if message else "")
                  if not subject or subject in seen_subjects:
                      continue
                  if is_version_only_commit(subject):
                      continue
                  seen_subjects.add(subject)
                  subjects.append(subject)
              return subjects


          def append_commit_subjects(lines: list[str], commits: list[str], repo: str) -> None:
              if commits:
                  ordered_commits = [
                      subject
                      for _, subject in sorted(enumerate(commits), key=commit_sort_key)
                  ]
                  visible_commits = ordered_commits[:MAX_COMMITS_PER_DEPENDENCY]
                  if len(ordered_commits) > MAX_COMMITS_PER_DEPENDENCY:
                      hidden_count = len(ordered_commits) - (MAX_COMMITS_PER_DEPENDENCY - 1)
                      visible_commits = [
                          *ordered_commits[: MAX_COMMITS_PER_DEPENDENCY - 1],
                          f"...and {hidden_count} more commits",
                      ]

                  for subject in visible_commits:
                      lines.append(f"- {link_pr_references(subject, repo)}")
              else:
                  lines.append("- No non-release commit details were returned for this range.")


          def build_dependency_section(dependency: dict[str, str]) -> list[str]:
              name = dependency["name"]
              repo = dependency["repo"]
              path = dependency["path"]
              previous_version = extract_version(git_show(PREV_TAG, path), dependency)
              current_version = extract_version(read_current(path), dependency)

              if not previous_version or not current_version:
                  return []
              if previous_version == current_version:
                  return []

              lines = [
                  f"### `{name}` `{previous_version}` -> `{current_version}`",
              ]

              try:
                  base_tag = ""
                  head_tag = ""
                  try:
                      base_tag = resolve_tag(repo, name, previous_version)
                      head_tag = resolve_tag(repo, name, current_version)
                  except Exception as error:
                      print(
                          f"::warning::Failed to resolve GitHub tags for {name}: {error}",
                          file=sys.stderr,
                      )

                  if base_tag and head_tag:
                      try:
                          comparison = compare_tags(repo, base_tag, head_tag)
                          if not isinstance(comparison, dict):
                              raise TypeError(
                                  f"unexpected compare payload: {type(comparison).__name__}",
                              )
                      except Exception as error:
                          print(
                              f"::warning::Failed to compare GitHub tags for {name}: {error}",
                              file=sys.stderr,
                          )
                      else:
                          compare_url = comparison.get("html_url") or (
                              f"https://github.com/{repo}/compare/"
                              f"{urllib.parse.quote(base_tag, safe='')}..."
                              f"{urllib.parse.quote(head_tag, safe='')}"
                          )
                          lines.append(f"Compare: [`{base_tag}...{head_tag}`]({compare_url})")

                          commits = []
                          seen_subjects = set()
                          for commit in comparison.get("commits", []):
                              message = (
                                  ((commit.get("commit") or {}).get("message") or "").splitlines()
                              )
                              subject = format_commit_subject(message[0] if message else "")
                              if not subject or subject in seen_subjects:
                                  continue
                              if is_version_only_commit(subject):
                                  continue
                              seen_subjects.add(subject)
                              commits.append(subject)
                          append_commit_subjects(lines, commits, repo)
                          return lines

                  previous_time = package_publish_time(dependency, previous_version)
                  current_time = package_publish_time(dependency, current_version)
                  if previous_time and current_time:
                      append_commit_subjects(
                          lines,
                          commits_between_times(repo, previous_time, current_time),
                          repo,
                      )
                  else:
                      lines.append(
                          "- Version changed, but matching GitHub tags and package publish "
                          "times were not found for one or both pinned versions.",
                      )
              except Exception as error:
                  print(
                      f"::warning::Failed to build MarkdownFlow changelog for {name}: {error}",
                      file=sys.stderr,
                  )
                  lines.append("- Version changed, but release note lookup failed.")

              return lines


          def main() -> None:
              if not PREV_TAG:
                  write_output("")
                  return

              sections = []
              for dependency in DEPENDENCIES:
                  section = build_dependency_section(dependency)
                  if section:
                      sections.append("\n".join(section))

              if not sections:
                  write_output("")
                  return

              content = "## MarkdownFlow Dependency Updates\n\n" + "\n\n".join(sections)
              write_output(content)


          main()
          PY

      - name: Create GitHub Release Draft
        if: env.ACT != 'true'
        uses: softprops/action-gh-release@v2.6.1
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog_content }}

            ${{ steps.markdownflow_dependency_changelog.outputs.content }}

            ## 📦 Installation from Source

            ```bash
            git clone ${{ github.event.repository.clone_url }}
            cd ${{ github.event.repository.name }}
            git checkout ${{ steps.version.outputs.tag }}
            cd docker
            cp .env.example.full .env
            # Fill in your LLM API key in the .env configuration file.
            docker compose up
            ```

            ## 📖 Documentation

            - 📚 [README](${{ github.event.repository.html_url }}/blob/${{ github.event.repository.default_branch }}/README.md)
            - 🔧 [Contributing Guidelines](${{ github.event.repository.html_url }}/blob/${{ github.event.repository.default_branch }}/CONTRIBUTING.md)
            - 📋 [Changelog](${{ github.event.repository.html_url }}/releases)

            ## 🆘 Support

            - 🐛 [Report Issues](${{ github.event.repository.html_url }}/issues)
            - 💬 [Discussions](${{ github.event.repository.html_url }}/discussions)
            - ⭐ [Give us a star](${{ github.event.repository.html_url }}) if this project helped you!

          draft: true
          prerelease: false
          make_latest: false

      - name: Create PR with version changes
        id: cpr
        if: env.ACT != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: flow version to ${{ steps.version.outputs.tag }}"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: release/version-bump-${{ steps.version.outputs.tag }}
          base: ${{ github.ref_name }}
          title: "chore: flow version to ${{ steps.version.outputs.tag }}"
          body: |
            This PR prepares the repository for release ${{ steps.version.outputs.tag }}.

            - Updates detected version files to `${{ steps.version.outputs.version }}`
            - Keeps release tag creation separate (draft already created)

            Changelog preview:

            ${{ steps.changelog.outputs.changelog_content }}

            ${{ steps.markdownflow_dependency_changelog.outputs.content }}

          labels: |
            release
            automated
          draft: false

      - name: Output PR info
        if: steps.cpr.outputs.pull-request-number
        run: |
          echo "✅ Created PR #${{ steps.cpr.outputs.pull-request-number }}: ${{ steps.cpr.outputs.pull-request-url }}"
          echo "Pull Request URL: ${{ steps.cpr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "## 📋 Release Preparation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Draft Release Created**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the draft release and changelog" >> $GITHUB_STEP_SUMMARY
          echo "2. Run the **Publish Release** workflow to complete the release" >> $GITHUB_STEP_SUMMARY
          echo "3. Docker images and deployment will happen automatically after publishing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous Tag**: ${{ steps.prev_tag.outputs.prev_tag || 'None (Initial Release)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Draft Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
